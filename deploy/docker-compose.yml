services:
  oracle-proxy:
    image: oracle-proxy:local
    container_name: oracle-proxy
    restart: unless-stopped
    networks: [fiap-net]
    environment:
      UPSTREAM_BASE_URL: "https://oracleapex.com/ords/alexisrondo/fiapconnect/"
      IMPERSONATE_PROFILE: "chrome124"

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    networks: [fiap-net]
    depends_on: [fiap-api]
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: "${DOMAIN:-localhost}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  fiap-api:
    image: fiap-connect:local
    container_name: fiap-api
    restart: unless-stopped
    networks: [fiap-net]
    depends_on: [oracle-proxy]
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      Jwt__SecretKey: "${JWT_SECRET_KEY}"
      Jwt__Issuer: "FiapConnect.API"
      Jwt__Audience: "FiapConnect.Mobile"
      Jwt__ExpirationHours: 8
      MongoDb__ConnectionString: "${MONGO_CONN}"
      MongoDb__DatabaseName: "fiap_connect"
      Oracle__BaseUrl: "http://oracle-proxy:9000/"
      Firebase__CredentialsPath: "/secrets/serviceAccountKey.json"
    volumes:
      - ./serviceAccountKey.json:/secrets/serviceAccountKey.json:ro

networks:
  fiap-net:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
